<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;family=DM+Sans:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>

  <!-- Subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1c1c1c" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1c1c1c" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1c1c1c" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1c1c1c" stroke-width="1"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#c8f060"/>

  <!-- Left side — file cards -->
  <!-- File 1 -->
  <rect x="60" y="160" width="220" height="140" rx="8" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="60" y="160" width="220" height="4" rx="2" fill="#c8f060" opacity="0.8"/>
  <text font-family="DM Mono, monospace" font-size="10" fill="#c8f060" x="76" y="182">CONCEPT: mentat</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#555" x="76" y="198">TLDR: civic intelligence...</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#555" x="76" y="213">ANSWERS_WHEN: ISTAT, civic</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#60c8f0" x="76" y="228">SIMILAR_HIGH: prescient</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#60c8f0" opacity="0.6" x="76" y="243">SIMILAR_MID: civis</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#333" x="76" y="258">VALIDATED: 2025-05</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#333" x="76" y="273">---</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#444" x="76" y="288">body content...</text>

  <!-- File 2 -->
  <rect x="60" y="320" width="220" height="100" rx="8" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="60" y="320" width="220" height="4" rx="2" fill="#60c8f0" opacity="0.5"/>
  <text font-family="DM Mono, monospace" font-size="10" fill="#60c8f0" x="76" y="342">CONCEPT: prescient</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#555" x="76" y="357">ANSWERS_WHEN: analytics...</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#333" x="76" y="372">SIMILAR_HIGH: mentat</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#333" x="76" y="387">---</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#333" x="76" y="402">body content...</text>

  <!-- File 3 -->
  <rect x="60" y="440" width="220" height="80" rx="8" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="60" y="440" width="220" height="4" rx="2" fill="#60c8f0" opacity="0.3"/>
  <text font-family="DM Mono, monospace" font-size="10" fill="#555" x="76" y="462">CONCEPT: civis</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#444" x="76" y="477">ANSWERS_WHEN: segnalazione...</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#333" x="76" y="492">---</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#2a2a2a" x="76" y="507">body content...</text>

  <!-- Arrows from files to index -->
  <path d="M 282 220 Q 330 220 330 315" stroke="#2a2a2a" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <path d="M 282 370 L 330 370 L 330 335" stroke="#2a2a2a" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <path d="M 282 480 Q 330 480 330 395" stroke="#2a2a2a" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>

  <!-- Index box (center-left) -->
  <rect x="310" y="290" width="180" height="90" rx="8" fill="#141414" stroke="#c8f060" stroke-width="1" opacity="0.8"/>
  <text font-family="DM Mono, monospace" font-size="10" fill="#c8f060" x="326" y="312">_index.md</text>
  <text font-family="DM Mono, monospace" font-size="8" fill="#888" x="326" y="328">mentat   → ISTAT, civic</text>
  <text font-family="DM Mono, monospace" font-size="8" fill="#888" x="326" y="342">prescient → analytics</text>
  <text font-family="DM Mono, monospace" font-size="8" fill="#888" x="326" y="356">civis    → segnalazione</text>
  <text font-family="DM Mono, monospace" font-size="8" fill="#555" x="326" y="370">...</text>

  <!-- Arrow from index to center -->
  <path d="M 492 335 L 560 335" stroke="#c8f060" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arr)"/>

  <!-- Query box -->
  <rect x="560" y="300" width="220" height="70" rx="8" fill="#0d1a0d" stroke="#c8f060" stroke-width="1.5"/>
  <text font-family="DM Mono, monospace" font-size="9" fill="#888" x="576" y="322">query:</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#e8e8e0" x="576" y="337">"ISTAT incidenti"</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#c8f060" x="576" y="352">↳ match: mentat</text>
  <text font-family="DM Mono, monospace" font-size="8" fill="#60c8f0" x="576" y="364">+ prescient (HIGH)</text>

  <!-- Arrow to result -->
  <path d="M 782 335 L 840 335" stroke="#c8f060" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="840" y="300" width="200" height="70" rx="8" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text font-family="DM Mono, monospace" font-size="9" fill="#888" x="856" y="322">loaded:</text>
  <text font-family="DM Mono, monospace" font-size="9" fill="#c8f060" x="856" y="337">2 / 7 files</text>
  <text font-family="DM Mono, monospace" font-size="8" fill="#60c8f0" x="856" y="352">mentat.md</text>
  <text font-family="DM Mono, monospace" font-size="8" fill="#60c8f0" x="856" y="364">prescient.md</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#c8f060" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Main title area -->
  <text font-family="DM Mono, monospace" font-size="11" font-weight="500" fill="#c8f060" letter-spacing="3" x="560" y="160">CKP LLM</text>
  <text font-family="DM Sans, sans-serif" font-size="38" font-weight="300" fill="#e8e8e0" x="556" y="210">Compiled Knowledge</text>
  <text font-family="DM Sans, sans-serif" font-size="38" font-weight="300" fill="#e8e8e0" x="556" y="255">Pattern</text>

  <!-- Description -->
  <text font-family="DM Sans, sans-serif" font-size="15" font-weight="300" fill="#888" x="556" y="456">Pre-compiled semantic relationships.</text>
  <text font-family="DM Sans, sans-serif" font-size="15" font-weight="300" fill="#888" x="556" y="476">Zero infrastructure. Any LLM.</text>

  <!-- Builds on -->
  <text font-family="DM Mono, monospace" font-size="10" fill="#444" x="556" y="520">↗ builds on Karpathy's LLM Wiki pattern</text>

  <!-- Author -->
  <text font-family="DM Mono, monospace" font-size="11" fill="#555" x="556" y="570">Alessandro Marocchini · Aworan</text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="#c8f060" opacity="0.3"/>
</svg>
